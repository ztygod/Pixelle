[llm]
provider = "openai-compatible"
model = "gpt-4.1"
temperature = 0.2
timeoutMs = 120000
maxRetries = 2
apiKeyEnv = "OPENAI_API_KEY"

[runtime]
workspaceDir = "."
maxIterations = 10
maxRepairAttempts = 2
tokensLimit = 32000
systemInstructions = []
rollbackOnFailure = true

[permissions]
readFile = true
writeFile = false
shell = false
network = false

[verification]
enabled = true
commands = ["pnpm typecheck"]

[trace]
enabled = true
directory = ".pixelle"
